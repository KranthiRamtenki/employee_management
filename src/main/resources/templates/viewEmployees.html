<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Details</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f1f5f9;
    padding:30px;
}

.container{
    max-width:1300px;
    margin:auto;
}

.header{
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    padding:20px 30px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    font-size:30px;
}

.home-btn{
    text-decoration:none;
    background:white;
    color:#2563eb;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
}

.table-card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#2563eb;
    color:white;
}

th,td{
    padding:15px;
    text-align:left;
}

tbody tr{
    border-bottom:1px solid #e2e8f0;
}

tbody tr:hover{
    background:#f8fafc;
}

.action-btn{
    padding:8px 12px;
    border-radius:6px;
    color:white;
    text-decoration:none;
    margin-right:5px;
}

.edit-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#dc2626;
}

.view-btn{
    background:#16a34a;
}

.no-data{
    text-align:center;
    padding:30px;
    color:#64748b;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
    <h1><i class="fa-solid fa-users"></i> Employee Details</h1>

    <a href="/home.html" class="home-btn">
        <i class="fa-solid fa-house"></i> Home
    </a>
</div>

<div class="table-card">

<div class="search-box">
    <input type="text" placeholder="Search Employee...">
</div>

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Department</th>
    <th>Designation</th>
    <th>Salary</th>
    <th>Join Date</th>
    <th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="emp : ${employees}">
    <td th:text="${emp.empId}"></td>
    <td th:text="${emp.name}"></td>
    <td th:text="${emp.email}"></td>
    <td th:text="${emp.department}"></td>
    <td th:text="${emp.designation}"></td>
    <td th:text="${emp.salary}"></td>
    <td th:text="${emp.joinDate}"></td>

    <td>
        

        <a th:href="@{/employee/edit/{id}(id=${emp.empId})}"
           class="action-btn edit-btn">
           Edit
        </a>

        <a th:href="@{/employee/delete/{id}(id=${emp.empId})}"
           class="action-btn delete-btn"
           onclick="return confirm('Are you sure?')">
           Delete
        </a>
    </td>
</tr>

<tr th:if="${#lists.isEmpty(employees)}">
    <td colspan="8" class="no-data">
        No Employees Found
    </td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
